<!DOCTYPE html>
<!-- VeloAcademy index.html v1.1.5 | 2026-04-23 | GOOGLE_CLIENT_ID via /api/config/google-client.js (container) -->
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloAcademy - Treinamento Corporativo</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="icon" type="image/png" href="./academy.png">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Evita flash da home: sem sessão válida, esconde main/header até o login (mesma regra que auth.js isSessionValid — 4 h) -->
    <style id="velo-preauth-style">
        html:not(.velo-show-app) body > main { display: none !important; }
        html:not(.velo-show-app) body > #main-header { display: none !important; }
        html:not(.velo-show-app) body > #login-page-container { display: block; min-height: 100vh; }
        html.velo-show-app body > main { display: block !important; }
        html.velo-show-app body > #main-header { display: block !important; }
    </style>
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('veloacademy_user_session');
                if (!raw) return;
                var s = JSON.parse(raw);
                var fourHours = 4 * 60 * 60 * 1000;
                if (!s || !s.loginTimestamp || (Date.now() - s.loginTimestamp >= fourHours)) return;
                document.documentElement.classList.add('velo-show-app');
            } catch (e) { /* ignora */ }
        })();
    </script>
</head>
<body>

    <header id="main-header" style="display: none;">
        <div class="container header-container">
            <div class="logo" id="logo-container">
                <img id="logo-image" class="logo-image" src="./academy.png" alt="VeloAcademy Logo">
            </div>
            
            <nav class="nav-menu">
                <!-- Todos os botões ocultos até login -->
                <a href="./index.html" class="nav-link active hidden-nav-item">Home</a>
                <a href="./cursos.html" class="nav-link hidden-nav-item">Cursos</a>
                <a href="./conquistas.html" id="nav-conquistas" class="nav-link hidden-nav-item">Conquistas</a>
                <a href="./auto-feedback.html" id="nav-feedback" class="nav-link hidden-nav-item disabled" style="opacity: 0.5; cursor: not-allowed;">Feedback</a>
                <a href="https://app.velohub.velotax.com.br" class="nav-link hidden-nav-item" target="_blank">VeloHub</a>
            </nav>


            
            <div class="user-info hidden-nav" id="user-info">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar" style="display: none;">
                <span id="user-name" class="user-name"></span>
                <button id="logout-btn" class="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            
            <div class="theme-switch-wrapper" id="theme-toggle">
                <span class="theme-icon">☀️</span>
            </div>
        </div>
    </header>

    <main class="home-page-main">
        <div class="container main-container">
            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-content">
                    <div class="hero-heading-row">
                        <h1 class="hero-title">Bem-vindo à <span class="accent-text">VeloAcademy</span></h1>
                        <p class="hero-subtitle">Conhecimento e Ferramentas pro seu dia a dia</p>
                    </div>
                    <section class="dashboard-section dashboard-section--home-inline">
                        <div class="dashboard-grid dashboard-grid--home-inline">
                            <a href="./cursos.html" id="dashboard-ver-cursos-btn" class="dashboard-card dashboard-card--home-value dashboard-card--clickable">
                                <div class="dashboard-card-body-row">
                                    <div class="card-icon card-icon--compact card-icon--png">
                                        <img class="card-icon-img" src="./Public/curso%20icon.png" width="48" height="48" alt="">
                                    </div>
                                    <div class="dashboard-card-copy">
                                        <h3>Cursos</h3>
                                        <p>Continue de onde parou</p>
                                    </div>
                                </div>
                            </a>
                            <a href="./conquistas.html" class="dashboard-card dashboard-card--home-value dashboard-card--clickable">
                                <div class="dashboard-card-body-row">
                                    <div class="card-icon card-icon--compact card-icon--png">
                                        <img class="card-icon-img" src="./Public/conquista%20icon.png" width="48" height="48" alt="">
                                    </div>
                                    <div class="dashboard-card-copy">
                                        <h3>Conquistas</h3>
                                        <p>Seu progresso na academia!</p>
                                    </div>
                                </div>
                            </a>
                            <a href="./auto-feedback.html" class="dashboard-card dashboard-card--home-value dashboard-card--clickable">
                                <div class="dashboard-card-body-row">
                                    <div class="card-icon card-icon--compact card-icon--png">
                                        <img class="card-icon-img" src="./Public/feedback%20icon.png" width="48" height="48" alt="">
                                    </div>
                                    <div class="dashboard-card-copy">
                                        <h3>Auto Feedback</h3>
                                        <p>Suas avaliações, dicas, e revisões</p>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </section>
                </div>
            </section>
        </div>
        <div class="home-remainder-frame" aria-label="Área de conteúdo complementar">
            <div class="home-remainder-inner">
                <div class="container-secondary home-secondary-split home-secondary-split--30">
                    <h2 class="home-secondary-title">Novo pra você:</h2>
                    <ul id="home-recent-courses-list" class="home-recent-courses-list" aria-label="Temas recentes na VeloAcademy"></ul>
                </div>
                <div class="container-secondary home-secondary-split home-secondary-split--60">
                    <h2 class="home-secondary-title">Dicas rápidas e processos</h2>
                    <ul id="home-quick-tips-list" class="home-quick-tips-list" aria-label="Vídeos tutoriais em destaque"></ul>
                </div>
            </div>
        </div>
    </main>

    <!-- Container para Login Page -->
    <div id="login-page-container"></div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="./js/toast.js"></script>
    <script src="./js/config/api-config.js"></script>
    <script src="/api/config/google-client.js"></script>
    <script src="./js/config/google-config.js"></script>
    <script src="./js/services/auth-service.js"></script>
    <script src="./js/auth.js" defer></script>
    <script src="./js/login-page.js"></script>
    <script src="./js/home.js"></script>
    <script src="./js/theme-toggle.js"></script>
    <script>
        // Inicializar login page quando necessário
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const sessionValid = typeof isSessionValid === 'function' ? isSessionValid() : false;
                const header = document.getElementById('main-header') || document.querySelector('header');
                const mainContent = document.querySelector('main');
                const loginContainer = document.getElementById('login-page-container');

                if (sessionValid) {
                    document.documentElement.classList.add('velo-show-app');
                    if (loginContainer) loginContainer.style.display = 'none';
                    if (header) header.style.display = 'block';
                    if (mainContent) mainContent.style.display = 'block';
                    const session = typeof getUserSession === 'function' ? getUserSession() : null;
                    if (session && typeof showHeaderButtons === 'function') {
                        showHeaderButtons(session.user);
                    }
                } else {
                    document.documentElement.classList.remove('velo-show-app');
                    if (header) header.style.display = 'none';
                    if (mainContent) mainContent.style.display = 'none';
                    if (loginContainer) loginContainer.style.display = 'block';

                    if (typeof initLoginPage === 'function') {
                        initLoginPage('login-page-container', function(userData) {
                            console.log('Login bem-sucedido:', userData);
                            document.documentElement.classList.add('velo-show-app');
                            const lc = document.getElementById('login-page-container');
                            if (lc) lc.style.display = 'none';
                            const headerEl = document.getElementById('main-header') || document.querySelector('header');
                            if (headerEl) headerEl.style.display = 'block';
                            const mainEl = document.querySelector('main');
                            if (mainEl) mainEl.style.display = 'block';
                            if (typeof showHeaderButtons === 'function') {
                                showHeaderButtons(userData);
                            }
                            if (typeof showToast !== 'undefined' && showToast.success) {
                                showToast.success('Login concluído', 'Bem-vindo, ' + userData.name + '!');
                            }
                            /* Permanece na home (index) após login — não redireciona para cursos */
                        });
                    }
                }
            }, 0);
        });
    </script>
</body>
</html>
