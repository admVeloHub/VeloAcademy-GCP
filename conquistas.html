<!DOCTYPE html>
<!-- PAGE: conquistas.html | VERSION: v1.3.0 | DATE: 2026-04-23 -->
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conquistas - VeloAcademy</title>
    <script>
        // Bloquear acesso imediatamente se não for Lucas Gravina
        (function() {
            try {
                const sessionData = localStorage.getItem('veloacademy_user_session');
                if (sessionData) {
                    const session = JSON.parse(sessionData);
                    if (session && session.user) {
                        const userData = session.user;
                        // APENAS lucas.gravina@velotax.com.br tem acesso
                        const isLucasGravina = userData.email === 'lucas.gravina@velotax.com.br';
                        if (!isLucasGravina) {
                            window.location.href = './index.html';
                        }
                    } else {
                        window.location.href = './index.html';
                    }
                } else {
                    window.location.href = './index.html';
                }
            } catch (error) {
                console.error('Erro ao verificar acesso:', error);
                window.location.href = './index.html';
            }
        })();
    </script>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&display=swap">
    <link rel="icon" type="image/png" href="./academy.png">
</head>
<body>

    <header>
        <div class="container header-container">
            <div class="logo" id="logo-container">
                <img id="logo-image" class="logo-image" src="./academy.png" alt="VeloAcademy Logo">
            </div>
            
            <nav class="nav-menu">
                <a href="./index.html" class="nav-link">Home</a>
                <a href="./cursos.html" class="nav-link">Cursos</a>
                <a href="./conquistas.html" id="nav-conquistas" class="nav-link active">Conquistas</a>
                <a href="./auto-feedback.html" id="nav-feedback" class="nav-link disabled" style="opacity: 0.5; cursor: not-allowed;">Feedback</a>
                <a href="https://app.velohub.velotax.com.br" class="nav-link" target="_blank">VeloHub</a>
            </nav>

            <div class="user-info" id="user-info">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar" style="display: none;">
                <span id="user-name" class="user-name"></span>
                <button id="logout-btn" class="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            
            <div class="theme-switch-wrapper" id="theme-toggle">
                <span class="theme-icon">☀️</span>
            </div>
        </div>
    </header>

    <main>
        <div class="container main-container">
            <div class="container-secondary conquistas-badges-section">
                <h2 class="home-secondary-title">Temas concluídos</h2>
                <p id="conquistas-temas-hint" class="conquistas-badges-hint" hidden></p>
                <div id="conquistas-temas-grid" class="conquistas-badges-grid" aria-label="Badges por tema concluído"></div>
            </div>
            <div class="container-secondary conquistas-badges-section">
                <h2 class="home-secondary-title">Módulos Vencidos</h2>
                <p id="conquistas-modulos-hint" class="conquistas-badges-hint" hidden></p>
                <div id="conquistas-modulos-grid" class="conquistas-badges-grid" aria-label="Badges por módulo concluído"></div>
            </div>
            <div class="container-secondary conquistas-badges-section">
                <h2 class="home-secondary-title">Excelência do Atendimento</h2>
                <p id="conquistas-excelencia-hint" class="conquistas-badges-hint" hidden></p>
                <div id="conquistas-excelencia-grid" class="conquistas-badges-grid" aria-label="Excelência do Atendimento"></div>
            </div>

        </div>
    </main>

    <script src="./js/config/api-config.js"></script>
    <script src="./js/conquistas-badges.js" defer></script>
    <script src="./js/auth.js" defer></script>
    <script src="./js/veloacademy.js"></script>
    <script src="./js/theme-toggle.js"></script>
    <script>
        // Verificar acesso à página de conquistas imediatamente
        (function() {
            function verifyAccess() {
                // Aguardar auth.js carregar
                if (typeof window.isLucasGravinaUser === 'function') {
                    const isLucasGravina = window.isLucasGravinaUser();
                    if (!isLucasGravina) {
                        console.log('Acesso negado à página de Conquistas. Redirecionando...');
                        window.location.href = './index.html';
                    }
                } else {
                    // Tentar novamente após um pequeno delay
                    setTimeout(verifyAccess, 100);
                }
            }
            
            // Executar verificação quando DOM estiver pronto
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', verifyAccess);
            } else {
                verifyAccess();
            }
        })();
    </script>
</body>
</html>
